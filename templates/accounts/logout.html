{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-sm border-0 border-top border-secondary border-4 rounded-3">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-secondary mb-4">
                    <i class="fa-regular fa-circle-check" style="font-size: 4rem;"></i>
                </div>
                
                <h3 class="fw-bold text-dark">Logged Out Successfully</h3>
                <p class="text-muted mb-3 mt-2">
                    Thank you for using Expense Tracker. Your session has been securely closed.
                </p>
                
                <div class="alert alert-light border mt-4 text-secondary small">
                    <div class="spinner-border spinner-border-sm me-2 text-success" role="status"></div>
                    Redirecting to home screen in <span id="countdown" class="fw-bold text-dark">10</span> seconds...
                </div>
                
                <div class="d-grid gap-2 mt-4">
                    <a href="{% url 'login' %}" class="btn btn-outline-success px-4 py-2 fw-bold">
                        Login Again Now
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>

<script>
    // Total seconds for countdown
    let timeLeft = 10;
    const countdownElement = document.getElementById('countdown');

    // Update the timer every 1 second
    const timerId = setInterval(function() {
        timeLeft--;
        countdownElement.textContent = timeLeft;
        
        // When timer hits 0, redirect and stop the timer
        if (timeLeft <= 0) {
            clearInterval(timerId);
            window.location.href = "{% url 'home' %}";
        }
    }, 1000); // 1000 ms = 1 second
</script>
{% endblock %}

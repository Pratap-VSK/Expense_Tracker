{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-sm border-0 border-top border-danger border-4 rounded-3">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-danger mb-4">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem;"></i>
                </div>
                
                <h3 class="fw-bold text-dark">Are you sure?</h3>
                <p class="text-muted mb-4 mt-2">
                    Do you really want to delete this transaction? <br>
                    <strong>This action cannot be undone.</strong>
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="#" class="btn btn-light border px-4 py-2 fw-semibold">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4 py-2 fw-bold">
                            <i class="fa-solid fa-trash me-1"></i> Yes, Delete it
                        </button>
                    </div>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
